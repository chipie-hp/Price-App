<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap">
    <title>Price App</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            padding: 20px;
            margin: 0;
            background-color: #f5f5f5;
        }
        h1, h2, h3 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #333;
        }
        .menu {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .three-dots {
            cursor: pointer;
            display: block;
            height: 24px;
            width: 24px;
            background: url('three-dots-icon.svg') no-repeat center center;
        }
        .content {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 15px;
        }
    </style>
</head>
<body>
    <div class="menu">
        <h1>Price App</h1>
        <div class="three-dots"></div>
    </div>
    <div class="content">
        <h2>Welcome to the Price App</h2>
        <p>Your content goes here...</p>
    </div>
</body>
</html>
